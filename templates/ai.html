<style>
/* ===================================================
   @AI SUGGESTION POPUP
   =================================================== */
#aiSuggest {
  position: absolute;
  bottom: 78px;
  left: 28px;
  background: var(--white);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  box-shadow: var(--shadow-lg);
  padding: 6px;
  display: none;
  z-index: 150;
  min-width: 160px;
  animation: aiPopIn .15s ease;
}
@keyframes aiPopIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0);   }
}
#aiSuggest.show { display: block; }

.ai-suggest-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-radius: 12px;
  cursor: pointer;
  transition: background .15s;
}
.ai-suggest-item:hover { background: var(--ivory); }

.ai-suggest-icon {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.ai-suggest-icon svg { width: 16px; height: 16px; fill: #fff; }
.ai-suggest-name { font-weight: 800; font-size: .88rem; color: var(--charcoal); line-height: 1.2; }
.ai-suggest-sub  { font-size: .7rem; color: var(--muted); font-weight: 500; }

/* ===================================================
   AI RESPONSE BUBBLE
   =================================================== */
.ai-msg {
  background: linear-gradient(135deg, rgba(102,126,234,.1), rgba(118,75,162,.1)) !important;
  border: 1px solid rgba(102,126,234,.25) !important;
}
.ai-msg-header {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 6px;
}
.ai-msg-icon {
  width: 20px; height: 20px; border-radius: 50%;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.ai-msg-icon svg { width: 11px; height: 11px; fill: #fff; }
.ai-msg-label { font-size: .72rem; font-weight: 800; color: #667eea; letter-spacing: .3px; }

/* ===================================================
   AI TYPING INDICATOR
   =================================================== */
.ai-typing-wrapper {
  display: flex; align-items: center; gap: 5px;
  padding: 12px 16px;
  background: linear-gradient(135deg, rgba(102,126,234,.1), rgba(118,75,162,.1));
  border: 1px solid rgba(102,126,234,.25);
  border-radius: 18px 18px 18px 4px;
  width: fit-content;
}
.ai-typing-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #667eea; opacity: .4;
  animation: aiDot .9s infinite;
}
.ai-typing-dot:nth-child(2) { animation-delay: .2s; }
.ai-typing-dot:nth-child(3) { animation-delay: .4s; }
@keyframes aiDot {
  0%, 60%, 100% { transform: translateY(0);    opacity: .4; }
  30%            { transform: translateY(-5px); opacity: 1;  }
}

/* Mobile adjustments */
@media(max-width: 980px) {
  #aiSuggest { bottom: 84px; left: 16px; }
}
@media(max-width: 480px) {
  #aiSuggest { bottom: 78px; left: 12px; }
}
</style>

<script>
(function () {
  const aiIconSVG = '<svg viewBox="0 0 24 24"><path d="M12 2L9.09 8.26 2 9.27l5 4.87L5.82 21 12 17.77 18.18 21l-1.18-6.86L22 9.27l-7.09-1.01L12 2z"/></svg>';

  /* --------------------------------------------------
     Inject the suggestion popup div into .chat-area
  -------------------------------------------------- */
  const chatArea = document.querySelector('.chat-area');
  const suggestEl = document.createElement('div');
  suggestEl.id = 'aiSuggest';
  suggestEl.innerHTML =
    '<div class="ai-suggest-item" id="aiSuggestItem">' +
      '<div class="ai-suggest-icon">' + aiIconSVG + '</div>' +
      '<div><div class="ai-suggest-name">@AI</div>' +
      '<div class="ai-suggest-sub">Ask anything · searches web</div></div>' +
    '</div>';
  chatArea.appendChild(suggestEl);

  const aiSuggest = document.getElementById('aiSuggest');

  /* --------------------------------------------------
     Show / hide suggestion when user types @
  -------------------------------------------------- */
  msgInput.addEventListener('input', function () {
    const val = this.value;
    const lastAt = val.lastIndexOf('@');
    if (lastAt !== -1) {
      const after = val.slice(lastAt + 1).toLowerCase();
      if (!after.includes(' ') && 'ai'.startsWith(after)) {
        aiSuggest.classList.add('show');
      } else {
        aiSuggest.classList.remove('show');
      }
    } else {
      aiSuggest.classList.remove('show');
    }
  });

  /* Hide on outside click */
  document.addEventListener('click', function (e) {
    if (!aiSuggest.contains(e.target)) aiSuggest.classList.remove('show');
  });

  /* Click on @AI item → fill input */
  document.getElementById('aiSuggestItem').addEventListener('click', function () {
    const val = msgInput.value;
    const lastAt = val.lastIndexOf('@');
    msgInput.value = (lastAt !== -1 ? val.slice(0, lastAt) : val) + '@AI ';
    aiSuggest.classList.remove('show');
    msgInput.focus();
    actionIcon.innerHTML = sendIconSVG;
    mainActionBtn.title = 'Send message';
  });

  /* If suggestion is open and user presses Enter, select @AI first */
  msgInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && aiSuggest.classList.contains('show')) {
      e.stopImmediatePropagation();
      document.getElementById('aiSuggestItem').click();
    }
  }, true);

  /* --------------------------------------------------
     Patch sendMessage: show typing indicator when @AI sent
     Backend handles the actual AI call + DB storage + emit
  -------------------------------------------------- */
  const _origSend = sendMessage;
  let aiTypingId = null;

  sendMessage = function () {
    const msg = msgInput.value.trim();
    if (/^@ai\s+/i.test(msg) && currentReceiver) {
      _origSend();
      /* show typing indicator until receive_message arrives */
      aiTypingId = 'ai-typing-' + Date.now();
      const tw = document.createElement('div');
      tw.className = 'msg-wrapper received';
      tw.id = aiTypingId;
      tw.innerHTML =
        '<div class="ai-typing-wrapper">' +
          '<div class="ai-typing-dot"></div>' +
          '<div class="ai-typing-dot"></div>' +
          '<div class="ai-typing-dot"></div>' +
        '</div>';
      messagesDiv.appendChild(tw);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    } else {
      _origSend();
    }
  };

  /* --------------------------------------------------
     Patch appendMessage to render type='ai' bubbles
  -------------------------------------------------- */
  const _origAppend = appendMessage;
  appendMessage = function (data) {
    if (data.type === 'ai') {
      /* remove typing indicator if present */
      if (aiTypingId) {
        const t = document.getElementById(aiTypingId);
        if (t) t.remove();
        aiTypingId = null;
      }
      const wrapper = document.createElement('div');
      wrapper.className = 'msg-wrapper received';
      wrapper.dataset.msgId = data.id || '';

      const bubble = document.createElement('div');
      bubble.className = 'msg received ai-msg';

      const cleaned = (data.message || '')
        .replace(/\[\d+\]/g, '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');

      const ts = data.timestamp || data.time || '';
      const time = ts
        ? new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true })
        : new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });

      bubble.innerHTML =
        '<div class="ai-msg-header">' +
          '<div class="ai-msg-icon">' + aiIconSVG + '</div>' +
          '<span class="ai-msg-label">AI · Web</span>' +
        '</div>' +
        '<div>' + cleaned + '</div>' +
        '<div class="time-row"><span>' + time + '</span></div>';

      wrapper.appendChild(bubble);
      messagesDiv.appendChild(wrapper);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    } else {
      _origAppend(data);
    }
  };

})();
</script>
