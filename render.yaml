services:
  - type: web
    name: chit-chat
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k geventwebsocket.gunicorn.workers.GeventWebSocketWorker -w 1 app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chit-chat-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: WEATHER_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.6

databases:
  - name: chit-chat-db
    plan: free
